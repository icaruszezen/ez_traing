name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller ez_traing.spec

      - name: Extract tag version
        id: tag
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create zip archive
        shell: pwsh
        run: Compress-Archive -Path dist\ez_traing\* -DestinationPath "ez_traing-${{ steps.tag.outputs.version }}-windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ez_traing-${{ steps.tag.outputs.version }}-windows
          path: dist/ez_traing/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.version }}
          generate_release_notes: true
          files: ez_traing-${{ steps.tag.outputs.version }}-windows.zip
